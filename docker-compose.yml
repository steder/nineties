# Nineties — dev Compose stack.
# This is the day-to-day local stack. It is NOT production-shaped.
# Hosts: macOS (OrbStack / Docker Desktop), Linux, Windows + WSL2.
#
# Bring up: `just dev`     Tear down: `just down`     Logs: `just logs`
#
# Dev philosophy: only the services with operational complexity run in
# Docker (Postgres + AudioBookShelf). Librarian itself runs on the host via
# `just manage runserver` for faster iteration and native debugger support.
#
# A production-shaped compose with the Librarian container + Caddy reverse
# proxy lands when we set up real deployment (separate plan doc).

name: nineties

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: nineties-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nineties}
      POSTGRES_USER: ${POSTGRES_USER:-nineties}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      # Postgres 18+ wants a single mount at /var/lib/postgresql; it places
      # version-prefixed data subdirs (e.g. .../18/main) inside.
      - ./data/postgres:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"   # localhost-only by default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nineties} -d ${POSTGRES_DB:-nineties}"]
      interval: 5s
      timeout: 5s
      retries: 10

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: nineties-audiobookshelf
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Chicago}
    volumes:
      - ./data/audiobookshelf/config:/config
      - ./data/audiobookshelf/metadata:/metadata
      - ./fixtures/catalog:/audiobooks:ro       # dev fixture catalog (read-only)
      - ./data/audiobookshelf/podcasts:/podcasts
    ports:
      - "127.0.0.1:13378:80"
