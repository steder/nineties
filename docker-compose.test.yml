# Nineties — ephemeral stack for integration + e2e tests.
# Spun up by testcontainers / pytest fixtures; tear-down is fully clean (no volumes).
# Distinct project name and ports so it can run alongside the dev stack.

name: nineties-test

services:
  postgres-test:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: nineties_test
      POSTGRES_USER: nineties_test
      POSTGRES_PASSWORD: nineties_test
    tmpfs:
      - /var/lib/postgresql/data       # in-memory; faster, fully ephemeral
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nineties_test -d nineties_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  audiobookshelf-test:
    image: ghcr.io/advplyr/audiobookshelf:latest
    environment:
      TZ: America/Chicago
    tmpfs:
      - /config
      - /metadata
    volumes:
      - ./fixtures/catalog:/audiobooks:ro
    ports:
      - "127.0.0.1:51378:80"
